name: Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Release version name
        required: true
        default: 1.0.0
      version_code:
        description: Android versionCode integer
        required: true
        default: "100"
      publish_github_release:
        description: Create a GitHub Release after building
        required: true
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION_CODE: ${{ inputs.version_code }}
      APP_VERSION_NAME: ${{ inputs.version_name }}
      CHAQUOPY_BUILD_PYTHON: python
      RELEASE_STORE_FILE: ${{ runner.temp }}/release-keystore.jks
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing RELEASE_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RELEASE_STORE_FILE"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build signed release artifacts
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MasterDnsVPN-${{ inputs.version_name }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.publish_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${APP_VERSION_NAME}" \
            app/build/outputs/apk/release/*.apk \
            app/build/outputs/bundle/release/*.aab \
            --title "v${APP_VERSION_NAME}" \
            --generate-notes
